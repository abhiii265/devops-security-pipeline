version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install bandit flask
  build:
    commands:
      - echo "Starting HIGH-STRICT Security Audit..."
      # Removing '--exit-zero' ensures Bandit returns 1 on any finding
      # '-lll' ensures it only fails for HIGH severity (your AWS key)
      - bandit -r . -lll
artifacts:
  files:
    - "**/*"