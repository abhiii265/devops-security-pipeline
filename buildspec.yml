version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install bandit flask
  build:
    commands:
      - echo "Running Security Audit..."
      # -lll means "Only fail if a HIGH severity issue is found"
      - bandit -r . -lll
artifacts:
  files:
    - "**/*"